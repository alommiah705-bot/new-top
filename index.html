<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AT LIVE GLOBAL </title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#070b18;
  color:white;
  overflow-x:hidden;
}

/* PREMIUM HEADER */
#topText{
  text-align:center;
  padding:18px;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#00eaff,#a78bfa,#22c55e,#ff4ecd);
  background-size:300% 300%;
  animation:glow 6s infinite linear;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  position:relative;
}

@keyframes glow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* HEADLINES */
.ticker{
  overflow:hidden;
  white-space:nowrap;
  background:rgba(255,255,255,0.05);
  margin:4px 0;
  padding:6px;
}
.ticker span{
  display:inline-block;
  padding-left:100%;
  animation:move 292s linear infinite;
}
@keyframes move{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* COUNTRY */
#countryBox{padding:10px;}
.country{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px;
  margin:6px 0;
  background:rgba(255,255,255,0.06);
  border-radius:8px;
}
.flag{
  width:34px;
  height:22px;
  margin-right:8px;
  animation:wave 99s infinite;
}
@keyframes wave{
  0%{transform:rotate(0)}
  50%{transform:rotate(2deg) scale(1.05)}
  100%{transform:rotate(0)}
}

/* ADMIN */
#adminBtn{
  display:none;
  text-align:center;
  margin:10px;
}

#adminPanel{
  display:none;
  background:#111;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

/* FLOATING WELCOME */
.float{
  position:fixed;
  font-size:14px;
  opacity:0;
  animation:floatAnim 6s linear;
  color:#ffffff;
  text-shadow:0 0 10px #00eaff;
}

@keyframes floatAnim{
  0%{opacity:0;transform:translateY(0)}
  30%{opacity:1}
  100%{opacity:0;transform:translateY(-120px)}
}

input,button,select{padding:6px;margin:4px;}

</style>

</head>

<body>

<!-- TOP -->
<div id="topText">AT-LIVE GLOBAL TIME LINE..</div>

<!-- HEADLINES -->
<div class="ticker"><span id="h1">GLOBAL LIVE SYSTEM</span></div>
<div class="ticker"><span id="h2">INTERNATIONAL DASHBOARD</span></div>
<div class="ticker"><span id="h3">WELCOME TO AT LIVE PLATFORM</span></div>

<!-- ADMIN BUTTON -->
<div id="adminBtn">
<button onclick="openAdmin()">Admin Panel</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

<button onclick="exitAdmin()" style="background:red;color:white;border:none;padding:6px 10px;border-radius:6px;">
✖ Exit Admin
</button>

<h3>LOGIN</h3>
<input id="pass">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">

<h3>HEADLINES</h3>
<input id="i1"><button onclick="h1.innerText=i1.value">H1</button><br>
<input id="i2"><button onclick="h2.innerText=i2.value">H2</button><br>
<input id="i3"><button onclick="h3.innerText=i3.value">H3</button>

<hr>

<h3>ADD COUNTRY</h3>
<select id="countryList"></select>
<button onclick="addCountry()">Add</button>

</div>
</div>

<!-- COUNTRY -->
<div id="countryBox"></div>

<script>

/* PASSWORD */
let password="198666";

/* UNLOCK */
let count=0,timer=null,unlocked=false;

topText.onclick=()=>{
if(!timer){
timer=setTimeout(()=>{count=0;timer=null},10000);
}
count++;
if(count>=15){
unlocked=true;
adminBtn.style.display="block";
alert("ADMIN UNLOCKED");
}
};

/* ADMIN */
function openAdmin(){
if(!unlocked)return alert("Locked");
adminPanel.style.display="block";
}

/* LOGIN */
function login(){
if(pass.value===password){
panel.style.display="block";
}else alert("Wrong");
}

/* EXIT ADMIN (FULL HIDE FIXED) */
function exitAdmin(){
adminPanel.style.display="none";
panel.style.display="none";
adminBtn.style.display="none";
pass.value="";
unlocked=false;
}

/* COUNTRIES */
const data={
Bangladesh:{tz:"Asia/Dhaka",flag:"https://flagcdn.com/w80/bd.png"},
India:{tz:"Asia/Kolkata",flag:"https://flagcdn.com/w80/in.png"},
Pakistan:{tz:"Asia/Karachi",flag:"https://flagcdn.com/w80/pk.png"},
Nepal:{tz:"Asia/Kathmandu",flag:"https://flagcdn.com/w80/np.png"},
SriLanka:{tz:"Asia/Colombo",flag:"https://flagcdn.com/w80/lk.png"},
China:{tz:"Asia/Shanghai",flag:"https://flagcdn.com/w80/cn.png"},
Japan:{tz:"Asia/Tokyo",flag:"https://flagcdn.com/w80/jp.png"},
USA:{tz:"America/New_York",flag:"https://flagcdn.com/w80/us.png"},
UK:{tz:"Europe/London",flag:"https://flagcdn.com/w80/gb.png"},
UAE:{tz:"Asia/Dubai",flag:"https://flagcdn.com/w80/ae.png"},
Qatar:{tz:"Asia/Qatar",flag:"https://flagcdn.com/w80/qa.png"},
Saudi:{tz:"Asia/Riyadh",flag:"https://flagcdn.com/w80/sa.png"},
Malaysia:{tz:"Asia/Kuala_Lumpur",flag:"https://flagcdn.com/w80/my.png"},
Turkey:{tz:"Europe/Istanbul",flag:"https://flagcdn.com/w80/tr.png"}
};

for(let c in data){
let o=document.createElement("option");
o.value=c;
o.innerText=c;
countryList.appendChild(o);
}

let selected=[];

/* ADD COUNTRY */
function addCountry(){
selected.push(countryList.value);
render();
}

/* RENDER */
function render(){
countryBox.innerHTML="";
selected.forEach((c,i)=>{
let div=document.createElement("div");
div.className="country";
div.innerHTML=`
<div style="display:flex;align-items:center;">
<img class="flag" src="${data[c].flag}">
${c}
</div>
<div id="t${i}"></div>`;
countryBox.appendChild(div);
});
}

/* TIME */
setInterval(()=>{
selected.forEach((c,i)=>{
let el=document.getElementById("t"+i);
if(el){
el.innerText=new Date().toLocaleTimeString("en-US",{timeZone:data[c].tz});
}
});
},1000);

/* FLOATING WELCOME EFFECT */
setInterval(()=>{
let f=document.createElement("div");
f.className="float";
let arr=["❤️ WELCOME TO AT LIVE","⭐ GLOBAL SYSTEM","✨ LIVE DASHBOARD","🔥 INTERNATIONAL MODE"];
f.innerText=arr[Math.floor(Math.random()*arr.length)];
f.style.left=Math.random()*90+"%";
f.style.top=Math.random()*90+"%";
document.body.appendChild(f);
setTimeout(()=>f.remove(),6000);
},1200);

</script>

</body>
</html>
